<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Language Translation Tool</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 760px;
    background: #0a0a0a;
    border: 1px solid #27272a;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,255,255,0.04);
  }
  .header {
    border-bottom: 1px solid #27272a;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .icon-box {
    background: #fff;
    color: #000;
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    animation: bounce 3s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 800;
  }
  .header p {
    margin: 2px 0 0;
    font-size: 13px;
    color: #71717a;
  }
  .body { padding: 24px; }
  .lang-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  select {
    flex: 1;
    background: #18181b;
    color: #fff;
    border: 2px solid #27272a;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  select:hover { background: #27272a; }
  select:focus { outline: none; border-color: #52525b; }
  .swap-btn {
    background: #fff;
    color: #000;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
    font-size: 16px;
  }
  .swap-btn:hover { transform: scale(1.1); }
  .swap-btn:active { transform: scale(0.95); }
  .text-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 600px) {
    .text-grid { grid-template-columns: 1fr; }
  }
  .col-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .col-label span {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #71717a;
  }
  .icon-btn {
    background: none;
    border: none;
    color: #71717a;
    cursor: pointer;
    padding: 2px;
    display: flex;
    transition: 0.15s;
  }
  .icon-btn:hover { color: #fff; transform: scale(1.2); }
  .icon-btn:disabled { opacity: 0.25; cursor: default; }
  .icon-btn:disabled:hover { transform: none; color: #71717a; }
  textarea {
    width: 100%;
    height: 160px;
    resize: none;
    background: #18181b;
    border: 2px solid #27272a;
    border-radius: 12px;
    padding: 12px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
  }
  textarea::placeholder { color: #52525b; }
  textarea:focus { outline: none; border-color: #52525b; }
  .char-count {
    font-size: 11px;
    color: #52525b;
    text-align: right;
    margin-top: 4px;
  }
  .output-box {
    height: 160px;
    border: 2px solid #27272a;
    background: #18181b;
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    overflow-y: auto;
    color: #fff;
  }
  .placeholder { color: #52525b; }
  .copied-msg {
    font-size: 11px;
    color: #d4d4d8;
    text-align: right;
    margin-top: 4px;
    font-weight: 600;
  }
  .error-box {
    margin-top: 12px;
    background: #18181b;
    border: 2px solid #3f3f46;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fff;
  }
  .translate-btn {
    margin-top: 20px;
    width: 100%;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .translate-btn:hover { background: #e4e4e7; transform: scale(1.01); }
  .translate-btn:active { transform: scale(0.98); }
  .translate-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .footer-note {
    font-size: 11px;
    color: #52525b;
    text-align: center;
    margin-top: 12px;
  }
  .dots { display: flex; gap: 4px; align-items: center; justify-content: center; height: 100%; color: #a1a1aa; font-size: 13px; }
  .dot {
    width: 6px; height: 6px; background: #fff; border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  .fade-in { animation: fadeIn 0.4s ease-in; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="icon-box">🌐</div>
    <div>
      <h1>Translation Tool</h1>
      <p>Translate text instantly, beautifully</p>
    </div>
  </div>

  <div class="body">
    <div class="lang-row">
      <select id="sourceLang"></select>
      <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>
      <select id="targetLang"></select>
    </div>

    <button class="translate-btn" id="translateBtn">✨ Translate</button>

    <div class="text-grid">
      <div>
        <div class="col-label">
          <span>Source Text</span>
          <button class="icon-btn" id="speakSource" title="Listen">🔊</button>
        </div>
        <textarea id="inputText" placeholder="Type something to translate... (Ctrl+Enter)"></textarea>
        <div class="char-count" id="charCount">0 characters</div>
      </div>

      <div>
        <div class="col-label">
          <span>Translated Text</span>
          <div style="display:flex; gap:8px;">
            <button class="icon-btn" id="speakTarget" title="Listen">🔊</button>
            <button class="icon-btn" id="copyBtn" title="Copy">📋</button>
          </div>
        </div>
        <div class="output-box" id="outputBox"><span class="placeholder">Translation will appear here</span></div>
        <div class="copied-msg" id="copiedMsg" style="display:none;">Copied to clipboard!</div>
      </div>
    </div>

    <div class="error-box" id="errorBox" style="display:none;"></div>
  </div>
</div>

<script>
  const LANGUAGES = [
    { code: "en", name: "English" },
    { code: "hi", name: "Hindi" },
    { code: "es", name: "Spanish" },
    { code: "fr", name: "French" },
    { code: "de", name: "German" },
    { code: "zh", name: "Chinese" },
    { code: "ja", name: "Japanese" },
    { code: "ar", name: "Arabic" },
    { code: "ru", name: "Russian" },
    { code: "pt", name: "Portuguese" },
    { code: "bn", name: "Bengali" },
    { code: "ta", name: "Tamil" },
    { code: "te", name: "Telugu" },
    { code: "ur", name: "Urdu" },
  ];

  const sourceLangEl = document.getElementById('sourceLang');
  const targetLangEl = document.getElementById('targetLang');
  const inputTextEl = document.getElementById('inputText');
  const outputBoxEl = document.getElementById('outputBox');
  const charCountEl = document.getElementById('charCount');
  const errorBoxEl = document.getElementById('errorBox');
  const translateBtn = document.getElementById('translateBtn');
  const copiedMsgEl = document.getElementById('copiedMsg');

  LANGUAGES.forEach(l => {
    sourceLangEl.add(new Option(l.name, l.code));
    targetLangEl.add(new Option(l.name, l.code));
  });
  sourceLangEl.value = "en";
  targetLangEl.value = "hi";

  function showError(msg) {
    errorBoxEl.textContent = msg;
    errorBoxEl.style.display = 'block';
  }
  function clearError() {
    errorBoxEl.style.display = 'none';
  }

  inputTextEl.addEventListener('input', () => {
    charCountEl.textContent = inputTextEl.value.length + " characters";
  });

  inputTextEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      translate();
    }
  });

  async function translate() {
    const text = inputTextEl.value.trim();
    if (!text) {
      showError("Please enter some text to translate.");
      return;
    }
    clearError();
    translateBtn.disabled = true;
    translateBtn.innerHTML = "Translating...";
    outputBoxEl.innerHTML = '<div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';

    const sl = sourceLangEl.value;
    const tl = targetLangEl.value;

    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sl}|${tl}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data && data.responseData && data.responseData.translatedText) {
        outputBoxEl.innerHTML = `<span class="fade-in"></span>`;
        outputBoxEl.querySelector('span').textContent = data.responseData.translatedText;
        outputBoxEl.dataset.text = data.responseData.translatedText;
      } else {
        throw new Error("Empty response from translation service.");
      }
    } catch (e) {
      outputBoxEl.innerHTML = '<span class="placeholder">Translation will appear here</span>';
      showError("Translation failed: " + e.message);
    } finally {
      translateBtn.disabled = false;
      translateBtn.innerHTML = "✨ Translate";
    }
  }

  translateBtn.addEventListener('click', translate);

  document.getElementById('swapBtn').addEventListener('click', () => {
    const sl = sourceLangEl.value;
    const tl = targetLangEl.value;
    sourceLangEl.value = tl;
    targetLangEl.value = sl;

    const outText = outputBoxEl.dataset.text || "";
    const inText = inputTextEl.value;
    inputTextEl.value = outText;
    charCountEl.textContent = inputTextEl.value.length + " characters";
    if (inText) {
      outputBoxEl.innerHTML = `<span class="fade-in"></span>`;
      outputBoxEl.querySelector('span').textContent = inText;
      outputBoxEl.dataset.text = inText;
    } else {
      outputBoxEl.innerHTML = '<span class="placeholder">Translation will appear here</span>';
      outputBoxEl.dataset.text = "";
    }
  });

  document.getElementById('copyBtn').addEventListener('click', async () => {
    const text = outputBoxEl.dataset.text || "";
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      copiedMsgEl.style.display = 'block';
      setTimeout(() => { copiedMsgEl.style.display = 'none'; }, 1500);
    } catch (e) {
      showError("Could not copy text.");
    }
  });

  document.getElementById('speakSource').addEventListener('click', () => {
    const text = inputTextEl.value;
    if (!text) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = sourceLangEl.value;
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  });

  document.getElementById('speakTarget').addEventListener('click', () => {
    const text = outputBoxEl.dataset.text || "";
    if (!text) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = targetLangEl.value;
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  });
</script>

</body>
</html>
